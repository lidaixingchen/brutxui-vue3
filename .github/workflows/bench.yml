name: Bench

on:
    pull_request:
        branches: [main, vue]

concurrency:
    group: bench-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    baseline:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  ref: main

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue build

            - name: Run bench (main baseline)
              run: pnpm --filter brutx-ui-vue exec vitest bench --reporter=json > bench-main.json
              continue-on-error: true

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: bench-main
                  path: bench-main.json

    pr-compare:
        runs-on: ubuntu-latest
        needs: baseline
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue build

            - name: Run bench (PR)
              run: pnpm --filter brutx-ui-vue exec vitest bench --reporter=json > bench-pr.json
              continue-on-error: true

            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: bench-main
                  path: bench-artifacts

            - name: Generate diff report
              run: node scripts/bench-diff.mjs bench-artifacts/bench-main.json bench-pr.json > bench-report.md

            - name: Find comment
              uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
              id: fc
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: github-actions[bot]
                  body-includes: Performance Bench Report

            - name: Create or update comment
              uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.fc.outputs.comment-id }}
                  body-path: bench-report.md
                  edit-mode: replace
