name: Bench

on:
    pull_request:
        branches: [main, vue]

concurrency:
    group: bench-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    baseline:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: main

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue build

            - name: Run bench (main baseline)
              run: pnpm --filter brutx-ui-vue exec vitest bench --reporter=json > bench-main.json
              continue-on-error: true

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: bench-main
                  path: bench-main.json

    pr-compare:
        runs-on: ubuntu-latest
        needs: baseline
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue build

            - name: Run bench (PR)
              run: pnpm --filter brutx-ui-vue exec vitest bench --reporter=json > bench-pr.json
              continue-on-error: true

            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: bench-main
                  path: bench-artifacts

            - name: Generate diff report
              run: node scripts/bench-diff.mjs bench-artifacts/bench-main.json bench-pr.json > bench-report.md

            - name: Find comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
              id: fc
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: github-actions[bot]
                  body-includes: Performance Bench Report

            - name: Create or update comment
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.fc.outputs.comment-id }}
                  body-path: bench-report.md
                  edit-mode: replace
