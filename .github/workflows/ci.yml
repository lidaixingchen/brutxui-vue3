name: CI

on:
    push:
        branches: [main, vue]
    pull_request:
        branches: [main, vue]

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm -r typecheck

            - run: pnpm -r lint

            - run: pnpm --filter brutx-ui-vue build

            - run: pnpm --filter brutx-vue build

            - run: pnpm --filter brutx-registry-vue validate

            - run: pnpm --filter brutx-ui-vue test

            - run: pnpm --filter brutx-vue test
