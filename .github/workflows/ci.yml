name: CI

on:
    push:
        branches: [main, vue]
    pull_request:
        branches: [main, vue]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 24]
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
            # Turbo Remote Cache — 需在仓库 Secrets 中配置（见 docs/ARCHITECTURE_OPTIMIZATION_PLAN_V2.md §5.1）
            # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # changeset diff 需要完整历史

            - name: Check changeset presence (PR only)
              if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[no-changeset]')
              run: |
                  base="origin/${{ github.base_ref }}"
                  git fetch origin "${{ github.base_ref }}" --depth=1 || true
                  added=$(git diff --name-only "$base...HEAD" -- '.changeset/*.md' ':!.changeset/README.md' | wc -l)
                  code_changed=$(git diff --name-only "$base...HEAD" -- 'packages/ui/src/' 'packages/cli/src/' 'packages/ui/package.json' 'packages/cli/package.json' | wc -l)
                  if [ "$code_changed" -gt 0 ] && [ "$added" -eq 0 ]; then
                    echo "::error::代码变更未声明 changeset。请运行 'pnpm changeset' 生成变更说明；纯文档/CI 改动请在 PR 标题加 '[no-changeset]'。"
                    exit 1
                  fi
                  echo "✓ Changeset 检查通过（$added 个新增 changeset）"

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache Playwright Browser Binaries
              if: matrix.node-version == 22
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-

            - name: Clean up problematic APT repositories
              if: matrix.node-version == 22
              run: |
                  sudo rm -f /etc/apt/sources.list.d/azure-cli.list*
                  sudo rm -f /etc/apt/sources.list.d/microsoft*

            - name: Install Playwright Browser and Deps
              if: matrix.node-version == 22 && steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install Playwright Dependencies (when cache hit)
              if: matrix.node-version == 22 && steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install-deps chromium

            - name: Install fonts for visual tests
              if: matrix.node-version == 22
              run: sudo apt-get install -y fonts-inter || (sudo apt-get update && sudo apt-get install -y fonts-inter)

            - name: Build all packages (turbo)
              run: pnpm build

            - name: Check bundle size limits
              if: matrix.node-version == 22
              run: pnpm --filter brutx-ui-vue size

            - name: Audit CSS fallback coverage
              run: pnpm --filter brutx-ui-vue audit:fallback:check

            - name: Typecheck all packages (turbo)
              run: pnpm typecheck

            - name: Lint all packages (turbo)
              run: pnpm lint

            - name: Validate registry
              run: turbo run validate --filter=brutx-registry-vue

            - name: i18n mirror check (report)
              if: matrix.node-version == 22
              run: pnpm check:i18n
              continue-on-error: true

            - name: Test all packages (turbo)
              run: pnpm test

            - name: SSR smoke tests
              run: pnpm test:ssr

            - run: pnpm --filter brutx-ui-vue test:browser
              if: matrix.node-version == 22

            - run: pnpm --filter brutx-ui-vue test:visual
              if: matrix.node-version == 22

            - uses: actions/upload-artifact@v4
              if: matrix.node-version == 22 && failure()
              with:
                  name: playwright-visual-report
                  path: |
                      packages/ui/playwright-report
                      packages/ui/test-results

            - run: pnpm --filter brutx-vue test:integration
              if: matrix.node-version == 22
