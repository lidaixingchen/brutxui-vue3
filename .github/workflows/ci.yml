name: CI

on:
    push:
        branches: [main, vue]
    pull_request:
        branches: [main, vue]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

# Turbo Remote Cache — Vercel Remote Cache（方案 §5.1 强制要求，禁止不配置远程缓存就上线 turbo）
# 配置步骤（仅需一次）：
#   1. 在仓库根目录运行 `pnpm dlx turbo login`，浏览器授权 Vercel 账号
#   2. 运行 `pnpm dlx turbo link`，选择目标 Vercel 团队并启用 Remote Caching
#   3. 在 GitHub 仓库 Settings 配置：
#      - Secrets → Actions → New repository secret：`TURBO_TOKEN`（值见 ~/.turbo/config.json 的 token 字段）
#      - Variables → Actions → New repository variable：`TURBO_TEAM`（Vercel 团队 slug，即 vercel.com/<team-slug>）
#   4. 在 Vercel 团队 Settings → Remote Caching，确保 TURBO_TOKEN 对应的角色拥有
#      "Remote Cache Artifact" 写权限（默认 token 可能只有读权限，需手动授予写权限）
# 注：TURBO_TEAM 使用 variables 而非 secrets，因为团队 slug 非敏感信息（GitHub 最佳实践）

jobs:
    quality:
        name: Quality (build + typecheck + lint + validate)
        runs-on: ubuntu-latest
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  # PR 需要 0 用于 changeset 三点 diff；push 用 1 节省时间
                  fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

            - name: Check changeset presence (PR only)
              if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[no-changeset]')
              run: |
                  base="origin/${{ github.base_ref }}"
                  git fetch origin "${{ github.base_ref }}" --depth=1 || true
                  added=$(git diff --name-only "$base...HEAD" -- '.changeset/*.md' ':!.changeset/README.md' | wc -l)
                  code_changed=$(git diff --name-only "$base...HEAD" -- 'packages/ui/src/' 'packages/cli/src/' 'packages/ui/package.json' 'packages/cli/package.json' | wc -l)
                  if [ "$code_changed" -gt 0 ] && [ "$added" -eq 0 ]; then
                    echo "::error::代码变更未声明 changeset。请运行 'pnpm changeset' 生成变更说明；纯文档/CI 改动请在 PR 标题加 '[no-changeset]'。"
                    exit 1
                  fi
                  echo "✓ Changeset 检查通过（$added 个新增 changeset）"

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-quality-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-quality-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-
                      ${{ runner.os }}-turbo-quality-

            # turbo 并行执行：typecheck/lint 不依赖 build，与 build 同时跑；validate 依赖 build 会自动等待
            - name: Build + typecheck + lint (turbo parallel)
              run: pnpm exec turbo run build typecheck lint

            - name: Validate registry
              run: pnpm exec turbo run validate --filter=brutx-registry-vue

            - name: Verify exports field consistency
              run: pnpm --filter brutx-ui-vue check:exports

            - name: Check bundle size limits
              run: pnpm --filter brutx-ui-vue size

            - name: Audit CSS fallback coverage
              run: pnpm --filter brutx-ui-vue audit:fallback:check

            - name: i18n mirror check (report)
              run: pnpm check:i18n
              continue-on-error: true

    test:
        name: Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 24]
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 1

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-test-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-test-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-
                      ${{ runner.os }}-turbo-test-

            # test 与 test:ssr 都依赖 build，turbo 会先 build 再并行跑两个测试任务
            - name: Build + test + SSR (turbo)
              run: pnpm exec turbo run build test test:ssr

    visual:
        name: Visual & Browser tests
        runs-on: ubuntu-latest
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 1

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-visual-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-visual-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-
                      ${{ runner.os }}-turbo-visual-

            - name: Cache Playwright Browser Binaries
              id: playwright-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-playwright-

            - name: Clean up problematic APT repositories
              run: |
                  sudo rm -f /etc/apt/sources.list.d/azure-cli.list*
                  sudo rm -f /etc/apt/sources.list.d/microsoft*

            - name: Install Playwright Browser and Deps
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install Playwright Dependencies (when cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install-deps chromium

            - name: Install fonts for visual tests
              run: sudo apt-get install -y fonts-inter || (sudo apt-get update && sudo apt-get install -y fonts-inter)

            - name: Build (turbo)
              run: pnpm build

            - name: Browser tests
              run: pnpm --filter brutx-ui-vue test:browser

            - name: Visual regression tests
              run: pnpm --filter brutx-ui-vue test:visual

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-visual-report
                  path: |
                      packages/ui/playwright-report
                      packages/ui/test-results

    integration:
        name: CLI Integration tests
        runs-on: ubuntu-latest
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 1

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-integration-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-integration-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}-
                      ${{ runner.os }}-turbo-integration-

            - name: Build (turbo)
              run: pnpm build

            - name: CLI Integration tests
              run: pnpm --filter brutx-vue test:integration
