name: CI

on:
    push:
        branches: [main, vue]
    pull_request:
        branches: [main, vue]

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 24]
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache Playwright Browser Binaries
              if: matrix.node-version == 22
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-

            - name: Clean up problematic APT repositories
              if: matrix.node-version == 22
              run: |
                  sudo rm -f /etc/apt/sources.list.d/azure-cli.list*
                  sudo rm -f /etc/apt/sources.list.d/microsoft*

            - name: Install Playwright Browser and Deps
              if: matrix.node-version == 22 && steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install Playwright Dependencies (when cache hit)
              if: matrix.node-version == 22 && steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install-deps chromium

            - name: Install fonts for visual tests
              if: matrix.node-version == 22
              run: sudo apt-get install -y fonts-inter || (sudo apt-get update && sudo apt-get install -y fonts-inter)

            - run: pnpm --filter brutx-ui-vue build

            - run: pnpm -r typecheck

            - run: pnpm -r lint

            - run: pnpm --filter brutx-vue build

            - run: pnpm --filter brutx-registry-vue build

            - run: pnpm --filter brutx-registry-vue validate

            - run: pnpm --filter brutx-ui-vue test

            - run: pnpm --filter brutx-ui-vue test:visual
              if: matrix.node-version == 22

            - uses: actions/upload-artifact@v4
              if: matrix.node-version == 22 && failure()
              with:
                  name: playwright-visual-report
                  path: |
                      packages/ui/playwright-report
                      packages/ui/test-results

            - run: pnpm --filter brutx-vue test

            - run: pnpm --filter brutx-vue test:integration
              if: matrix.node-version == 22
