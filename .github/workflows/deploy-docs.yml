name: Deploy Docs

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # VitePress lastUpdated 需要 git 历史获取每页最后修改时间

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}
                  restore-keys: ${{ runner.os }}-turbo-

            # turbo 自动处理依赖顺序：先 build brutx-ui-vue（及 shared），再 build docs
            # 配合 turbo 缓存，若 UI 源码未变则跳过 UI 构建
            - name: Build docs (turbo)
              run: pnpm build:docs

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: apps/docs/.vitepress/dist
                  name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
              with:
                  artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
