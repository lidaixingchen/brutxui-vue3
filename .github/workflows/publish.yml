name: Publish

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: 'https://registry.npmjs.org'

            - run: pnpm install --frozen-lockfile

            - name: Cache Playwright Browser Binaries
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-

            - name: Clean up problematic APT repositories
              run: |
                  sudo rm -f /etc/apt/sources.list.d/azure-cli.list*
                  sudo rm -f /etc/apt/sources.list.d/microsoft*

            - name: Install Playwright Browser and Deps
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install Playwright Dependencies (when cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm --filter brutx-ui-vue exec playwright install-deps chromium

            - name: Install fonts for visual tests
              run: sudo apt-get install -y fonts-inter || (sudo apt-get update && sudo apt-get install -y fonts-inter)

            - name: Release reliability check
              run: pnpm release:check

            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-visual-report
                  path: |
                      packages/ui/playwright-report
                      packages/ui/test-results

            - name: Publish brutx-ui-vue
              working-directory: packages/ui
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set +e
                  pnpm publish --no-git-checks --access public --provenance > /tmp/publish-ui.log 2>&1
                  status=$?
                  if [ $status -eq 0 ]; then
                    cat /tmp/publish-ui.log
                    exit 0
                  fi
                  if grep -qiE "EPUBLISHCONFLICT|already published|version already exists" /tmp/publish-ui.log; then
                    echo "::warning::brutx-ui-vue version already exists, skipped"
                    exit 0
                  fi
                  cat /tmp/publish-ui.log >&2
                  exit $status

            - name: Publish brutx-vue
              working-directory: packages/cli
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set +e
                  pnpm publish --no-git-checks --access public --provenance > /tmp/publish-cli.log 2>&1
                  status=$?
                  if [ $status -eq 0 ]; then
                    cat /tmp/publish-cli.log
                    exit 0
                  fi
                  if grep -qiE "EPUBLISHCONFLICT|already published|version already exists" /tmp/publish-cli.log; then
                    echo "::warning::brutx-vue version already exists, skipped"
                    exit 0
                  fi
                  cat /tmp/publish-cli.log >&2
                  exit $status

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create ${{ github.ref_name }} \
                      --title "Release ${{ github.ref_name }}" \
                      --generate-notes
