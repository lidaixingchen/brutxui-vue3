name: Publish

on:
    push:
        tags:
            - 'v*'

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            # Turbo Remote Cache — Vercel Remote Cache（方案 §5.1；发布门禁 turbo run build/test/typecheck/lint 同样受益）
            # 配置步骤见 ci.yml 同名注释（TURBO_TOKEN 用 secrets，TURBO_TEAM 用 vars）
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 1 # 发布门禁不需要 git 历史；gh release --generate-notes 走 API

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: 'https://registry.npmjs.org'

            - run: pnpm install --frozen-lockfile

            - name: Cache turbo local build cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json') }}
                  restore-keys: ${{ runner.os }}-turbo-

            # 发布门禁：build + test + typecheck + lint（turbo 并行，test 依赖 build 自动等待）
            # test = vitest run（Node 环境），不需要 Playwright/浏览器
            - name: Release gate (turbo)
              run: pnpm exec turbo run build test typecheck lint

            - name: Verify changesets consumed
              run: |
                  if [ -d .changeset ] && [ -n "$(ls -A .changeset 2>/dev/null | grep -v config.json | grep -v README.md)" ]; then
                    echo "::error::Unconsumed changesets found — run 'pnpm version-packages' before tagging"
                    ls -A .changeset
                    exit 1
                  fi

            - name: Publish brutx-ui-vue
              working-directory: packages/ui
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set +e
                  pnpm publish --no-git-checks --access public --provenance > /tmp/publish-ui.log 2>&1
                  status=$?
                  if [ $status -eq 0 ]; then
                    cat /tmp/publish-ui.log
                    exit 0
                  fi
                  if grep -qiE "EPUBLISHCONFLICT|already published|version already exists" /tmp/publish-ui.log; then
                    echo "::warning::brutx-ui-vue version already exists, skipped"
                    exit 0
                  fi
                  cat /tmp/publish-ui.log >&2
                  exit $status

            - name: Publish brutx-vue
              working-directory: packages/cli
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set +e
                  pnpm publish --no-git-checks --access public --provenance > /tmp/publish-cli.log 2>&1
                  status=$?
                  if [ $status -eq 0 ]; then
                    cat /tmp/publish-cli.log
                    exit 0
                  fi
                  if grep -qiE "EPUBLISHCONFLICT|already published|version already exists" /tmp/publish-cli.log; then
                    echo "::warning::brutx-vue version already exists, skipped"
                    exit 0
                  fi
                  cat /tmp/publish-cli.log >&2
                  exit $status

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ github.ref_name }}
              run: |
                  gh release create "$TAG" \
                      --title "Release $TAG" \
                      --generate-notes
