name: Publish

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: 'https://registry.npmjs.org'

            - run: pnpm install --frozen-lockfile

            - run: pnpm -r typecheck

            - run: pnpm -r lint

            - run: pnpm --filter brutx-ui-vue test

            - run: pnpm --filter brutx-vue test

            - name: Build UI library
              run: pnpm --filter brutx-ui-vue build

            - name: Build CLI
              run: pnpm --filter brutx-vue build

            - name: Publish brutx-ui-vue
              working-directory: packages/ui
              run: pnpm publish --no-git-checks --access public --provenance || echo "::warning::brutx-ui-vue version already exists, skipped"

            - name: Publish brutx-vue
              working-directory: packages/cli
              run: pnpm publish --no-git-checks --access public --provenance || echo "::warning::brutx-vue version already exists, skipped"
