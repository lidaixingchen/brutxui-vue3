name: Publish

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: 'https://registry.npmjs.org'

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install fonts for visual tests
              run: sudo apt-get update && sudo apt-get install -y fonts-inter

            - name: Release reliability check
              run: pnpm release:check

            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-visual-report
                  path: |
                      packages/ui/playwright-report
                      packages/ui/test-results

            - name: Publish brutx-ui-vue
              working-directory: packages/ui
              run: pnpm publish --no-git-checks --access public --provenance || echo "::warning::brutx-ui-vue version already exists, skipped"

            - name: Publish brutx-vue
              working-directory: packages/cli
              run: pnpm publish --no-git-checks --access public --provenance || echo "::warning::brutx-vue version already exists, skipped"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create ${{ github.ref_name }} \
                      --title "Release ${{ github.ref_name }}" \
                      --generate-notes
