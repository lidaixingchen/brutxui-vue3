name: Update Visual Baselines

on:
    workflow_dispatch:

jobs:
    update-snapshots:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm --filter brutx-ui-vue exec playwright install --with-deps chromium

            - name: Install fonts for visual tests
              run: sudo apt-get update && sudo apt-get install -y fonts-inter

            - run: pnpm --filter brutx-ui-vue test:visual:update

            - uses: actions/upload-artifact@v4
              with:
                  name: updated-visual-baselines
                  path: packages/ui/visual/baselines/
