  ini: ^1.3.8
  vitepress>vite: ^6.4.3
  tsup>esbuild: ^0.28.1
  tsx>esbuild: ^0.28.1
  '@size-limit/esbuild>esbuild': ^0.28.1
  'brace-expansion@^2.0.2': ^2.1.2
  'brace-expansion@^5.0.5': ^5.0.7
